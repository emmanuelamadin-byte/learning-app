<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline | Learn Tracker</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        /* FIXED: Added Safe Area Padding here too */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(106, 216, 255, 0.16), transparent 30%),
          radial-gradient(circle at bottom right, rgba(140, 233, 154, 0.15), transparent 32%),
          #060816;
        color: #f8fafc;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }
      main {
        width: min(400px, calc(100vw - 48px));
        padding: 2.5rem 2rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        background: rgba(13, 19, 40, 0.8);
        backdrop-filter: blur(12px);
        box-shadow: 0 24px 80px rgba(10, 14, 30, 0.35);
        text-align: center;
      }
      h1 {
        font-family: "Space Grotesk", system-ui, sans-serif;
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
        color: #8ce99a;
      }
      p {
        margin: 0 0 2rem;
        line-height: 1.6;
        color: rgba(248, 250, 252, 0.8);
        font-size: 0.95rem;
      }
      .btn {
        display: inline-block;
        padding: 0.8rem 2rem;
        background: #8ce99a;
        color: #060816;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 700;
        transition: all 0.2s ease;
      }
      .btn:active {
        transform: scale(0.96);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're Offline</h1>
      <p>
        Don't worry. Learn Tracker is designed to work without a connection. 
        Any data you input now will sync once you're back online.
      </p>
      <a href="/" class="btn">Return Home</a>
    </main>
  </body>
</html>
