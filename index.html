<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Learn Tracker</title>
    <meta
      name="description"
      content="A premium accountability workspace for serious learners and study groups."
    />
    <meta name="theme-color" content="#060816" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', "ui-sans-serif", "system-ui"],
              display: ['"Space Grotesk"', '"Plus Jakarta Sans"', "system-ui"],
            },
            colors: {
              ink: "#060816",
              panel: "#0d1328",
              accent: "#8ce99a",
              accent2: "#6ad8ff",
              ember: "#ffb86c",
              border: "rgba(255,255,255,0.08)",
            },
            boxShadow: {
              glow: "0 24px 80px rgba(94, 234, 212, 0.12)",
            },
            backgroundImage: {
              noise:
                "radial-gradient(circle at top, rgba(106, 216, 255, 0.14), transparent 38%), radial-gradient(circle at bottom right, rgba(140, 233, 154, 0.12), transparent 32%)",
            },
            keyframes: {
              floatSlow: {
                "0%, 100%": { transform: "translateY(0px)" },
                "50%": { transform: "translateY(-10px)" },
              },
            },
            animation: {
              pulseSlow: "pulse 3s ease-in-out infinite",
              floatSlow: "floatSlow 9s ease-in-out infinite",
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="./src/styles/app.css" />

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "htm": "https://esm.sh/htm@3.1.1",
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.49.8"
        }
      }
    </script>
  </head>

  <body class="min-h-screen bg-ink text-white antialiased pb-[env(safe-area-inset-bottom)] pt-[env(safe-area-inset-top)]">
    <div id="app"></div>

    <script src="./app-config.js"></script>
    <script type="module" src="./src/main.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const reg = await navigator.serviceWorker.register("/sw.js");
            console.log("PWA active", reg);
          } catch (err) {
            console.error("PWA error", err);
          }
        });
      }
    </script>
  </body>
</html>
